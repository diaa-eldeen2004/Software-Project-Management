<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICDLS – Sign up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="auth">
  <div class="app-shell">
    <header class="top-bar">
      <div class="app-logo">
        <span>ICDLS</span>
        <span>Create your account</span>
      </div>
      <button id="themeToggle" class="btn btn-ghost btn-small">🌙 Dark</button>
    </header>

    <main class="auth-layout">
      <section class="card">
        <div class="auth-header">
          <h1>Sign up</h1>
          <p class="muted">Dummy form to illustrate the ICDLS sign up flow and styling.</p>
        </div>

        <form class="stack" autocomplete="off">
          <div class="input-row">
            <div>
              <label class="label" for="signupFirstName">First name</label>
              <input id="signupFirstName" class="input" type="text" placeholder="e.g. Lina">
            </div>
            <div>
              <label class="label" for="signupLastName">Last name</label>
              <input id="signupLastName" class="input" type="text" placeholder="e.g. Okafor">
            </div>
          </div>
          <div>
            <label class="label" for="signupEmail">Institutional email</label>
            <input id="signupEmail" class="input" type="email" placeholder="name@university.edu">
          </div>
          <div class="input-row">
            <div>
              <label class="label" for="signupRole">Primary role</label>
              <select id="signupRole">
                <option>Student · reader</option>
                <option>Researcher · reader & publisher</option>
                <option>Faculty · reader & publisher</option>
                <option>Librarian / admin</option>
                <option>IT · infrastructure</option>
              </select>
            </div>
            <div>
              <label class="label" for="signupPassword">Password</label>
              <input id="signupPassword" class="input" type="password" placeholder="Create a calm, strong password">
            </div>
          </div>
          <div>
            <button class="btn btn-primary" type="submit">Create account</button>
          </div>
        </form>

        <div class="auth-footer-links">
          <span>Already registered? <a href="login.html">Log in</a></span>
          <a href="help.html">Need help?</a>
        </div>
      </section>
    </main>
  </div>

  <footer class="footer">
    <span>Sign up · ICDLS</span>
    <span><a href="index.html">Back to home</a></span>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
