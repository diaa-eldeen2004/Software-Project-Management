<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICDLS – Forgot password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="auth">
  <div class="app-shell">
    <header class="top-bar">
      <div class="app-logo">
        <span>ICDLS</span>
        <span>Recover your access</span>
      </div>
    </header>

    <main class="auth-layout">
      <section class="card">
        <div class="auth-header">
          <h1>Forgot password</h1>
          <p class="muted">
            This dummy page shows how ICDLS would guide users through a calm password reset request.
          </p>
        </div>

        <form class="stack" autocomplete="off">
          <div>
            <label class="label" for="forgotEmail">Institutional email</label>
            <input id="forgotEmail" class="input" type="email" placeholder="name@university.edu">
          </div>
          <div>
            <button class="btn btn-primary" type="submit">Send reset link</button>
          </div>
        </form>

        <div class="auth-footer-links">
          <a href="login.html">Back to log in</a>
          <a href="help.html">Need more help?</a>
        </div>
      </section>
    </main>
  </div>

  <footer class="footer">
    <span>Forgot password · ICDLS</span>
    <span><a href="index.html">Back to home</a></span>
  </footer>
</body>
</html>
